<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Track Ticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand">Ticket Management System</a>
  </div>
</nav>

<!-- Track Form -->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <div class="card shadow-lg">
        <div class="card-header bg-primary text-white text-center">
          <h4 class="mb-0">Track Your Ticket</h4>
        </div>

        <div class="card-body">

          <form method="POST" action="trackservlet">

            <div class="mb-3">
              <label class="form-label">Ticket ID</label>
              <input type="text" name="tid" class="form-control" 
                     placeholder="Enter Ticket ID" required>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">
                Track Ticket
              </button>
            </div>

          </form>

        </div>
      </div>

      <!-- Optional Back Button -->
      <div class="text-center mt-3">
        <a href="index.html" class="btn btn-outline-secondary btn-sm">
          ← Back to Home
        </a>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
