<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Insert title here</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body>
	<!-- Navbar -->
	<nav class="navbar navbar-dark bg-dark">
  		<div class="container">
    		<a class="navbar-brand">Ticket Management System</a>
  		</div>
	</nav>
	<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white text-center">
      <h2>Raise Ticket</h2>
    </div>
    <div class="card-body">

      <form method="POST" action="./raiticketser">

        <div class="mb-3">
          <label class="form-label">Employee Name</label>
          <input type="text" name="nm" class="form-control" required>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Employee ID</label>
          <input type="text" name="eid" class="form-control" required>
        </div>
		
		<div class="mb-3">
  		<label class="form-label">Select Department</label>
  			<select name="dept" class="form-select" required>
    			<option value="" disabled selected>Select Department</option>
    			<option value="HR">Human Resource</option>
    			<option value="QA">Quality Assurance</option>
    			<option value="Testing">Testing</option>
  			</select>
		</div>
		
		<div class="mb-3">
  		<label class="form-label">Select Issue</label>
  			<select name="issue" class="form-select" required>
    			<option value="" disabled selected>Select Issue</option>
    			<option value="Network">Network Issue</option>
    			<option value="Software">Software Issue</option>
    			<option value="Hardware">Hardware Issue</option>
  			</select>
		</div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea name="desc" class="form-control" required minlength="10" maxlength="500" rows="4"></textarea>
        </div>

        <button type="submit" value="Submit" class="btn btn-success w-100">
          Submit Ticket
        </button>

      </form>

    </div>
  </div>
</div>
